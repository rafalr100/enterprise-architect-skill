<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#12182400"/>
    </linearGradient>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f0883e"/>
    </linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#1d2532" stroke-width="1"/>
    </pattern>
  </defs>

  <rect x="1" y="1" width="1198" height="298" rx="20" fill="url(#bg2)" stroke="#30363d" stroke-width="1.5"/>
  <rect x="600" y="2" width="598" height="296" rx="18" fill="url(#grid)" opacity="0.5"/>
  <rect x="0" y="20" width="6" height="260" rx="3" fill="url(#mono)"/>

  <!-- monogram -->
  <rect x="56" y="64" width="92" height="92" rx="20" fill="url(#mono)"/>
  <text x="102" y="128" font-size="46" font-weight="800" fill="#0d1117" text-anchor="middle">EA</text>

  <!-- title -->
  <text x="180" y="108" font-size="52" font-weight="800" fill="#e6edf3">Enterprise Architect</text>
  <text x="182" y="146" font-size="22" font-weight="500" fill="#8b949e">A Claude Skill — principal-architect judgement, on demand. Not an MCP server.</text>

  <!-- pills -->
  <g font-size="16" font-weight="600">
    <g>
      <rect x="182" y="186" width="168" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="266" y="212" fill="#fbbf24" text-anchor="middle">Discovery-first</text>
    </g>
    <g>
      <rect x="362" y="186" width="176" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="450" y="212" fill="#6e8bff" text-anchor="middle">Capability-first</text>
    </g>
    <g>
      <rect x="550" y="186" width="178" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="639" y="212" fill="#3fb950" text-anchor="middle">Trade-offs named</text>
    </g>
    <g>
      <rect x="740" y="186" width="214" height="40" rx="20" fill="#161b22" stroke="#30363d"/>
      <text x="847" y="212" fill="#bc8cff" text-anchor="middle">One recommendation</text>
    </g>
  </g>

  <!-- framework footer -->
  <text x="182" y="262" font-size="14" font-weight="500" fill="#6e7681" letter-spacing="1.5">TOGAF · ZACHMAN · C4 · WARDLEY · DDD — applied as silent lenses, never recited</text>
</svg>
