<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 540" width="1240" height="540" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11161f"/>
      <stop offset="1" stop-color="#0a0e15"/>
    </linearGradient>
    <linearGradient id="amberFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2706"/><stop offset="1" stop-color="#1a1206"/>
    </linearGradient>
    <linearGradient id="blueFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2440"/><stop offset="1" stop-color="#0e1320"/>
    </linearGradient>
    <linearGradient id="greenFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#103021"/><stop offset="1" stop-color="#0a160e"/>
    </linearGradient>
    <linearGradient id="axis" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="0.5" stop-color="#6e8bff"/><stop offset="1" stop-color="#3fb950"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1238" height="538" rx="22" fill="url(#d-bg)" stroke="#30363d" stroke-width="1.5"/>
  <text x="44" y="58" font-size="29" font-weight="800" fill="#e6edf3">One architecture, three altitudes</text>
  <text x="44" y="90" font-size="16" fill="#8b949e">Same substance, three altitudes. The vocabulary and the question change — re-altitude by <tspan fill="#c9d1d9" font-weight="700">subtraction</tspan>, not rewriting.</text>

  <!-- altitude axis -->
  <path d="M86 150 l10 16 h-7 v258 h7 l-10 16 l-10 -16 h7 v-258 h-7 z" fill="url(#axis)" opacity="0.9"/>
  <text x="64" y="186" font-size="12.5" font-weight="800" fill="#fbbf24" text-anchor="middle">less</text>
  <text x="64" y="202" font-size="12.5" font-weight="800" fill="#fbbf24" text-anchor="middle">detail</text>
  <text x="64" y="410" font-size="12.5" font-weight="800" fill="#3fb950" text-anchor="middle">more</text>
  <text x="64" y="426" font-size="12.5" font-weight="800" fill="#3fb950" text-anchor="middle">detail</text>

  <!-- pyramid tier 1: C-level -->
  <polygon points="450,150 510,150 575,236 385,236" fill="url(#amberFill)" stroke="#fbbf24" stroke-width="2"/>
  <circle cx="480" cy="174" r="13" fill="#fbbf24"/><text x="480" y="179" font-size="14" font-weight="800" fill="#0d1117" text-anchor="middle">1</text>
  <text x="480" y="224" font-size="15" font-weight="800" fill="#fbbf24" text-anchor="middle">C-LEVEL / BOARD</text>

  <!-- pyramid tier 2: architect -->
  <polygon points="383,244 577,244 627,330 333,330" fill="url(#blueFill)" stroke="#6e8bff" stroke-width="2"/>
  <circle cx="480" cy="270" r="13" fill="#6e8bff"/><text x="480" y="275" font-size="14" font-weight="800" fill="#0d1117" text-anchor="middle">2</text>
  <text x="480" y="312" font-size="15" font-weight="800" fill="#9db0ff" text-anchor="middle">SOLUTION ARCHITECTS</text>

  <!-- pyramid tier 3: engineering -->
  <polygon points="331,338 629,338 681,426 279,426" fill="url(#greenFill)" stroke="#3fb950" stroke-width="2"/>
  <circle cx="480" cy="366" r="13" fill="#3fb950"/><text x="480" y="371" font-size="14" font-weight="800" fill="#0d1117" text-anchor="middle">3</text>
  <text x="480" y="406" font-size="15" font-weight="800" fill="#56d364" text-anchor="middle">ENGINEERING / DELIVERY</text>

  <!-- connectors -->
  <g stroke-dasharray="3 4" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M575 193 H736" stroke="#fbbf24"/>
    <path d="M600 287 H736" stroke="#6e8bff"/>
    <path d="M650 382 H736" stroke="#3fb950"/>
  </g>

  <!-- cards -->
  <g>
    <rect x="740" y="150" width="456" height="92" rx="13" fill="url(#amberFill)" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="764" y="182" font-size="16" font-weight="800" fill="#fbbf24">“Do we fund / approve this?”</text>
    <text x="764" y="206" font-size="13.5" fill="#c9d1d9">Currency: <tspan font-weight="700" fill="#e6edf3">money · risk · time</tspan></text>
    <text x="764" y="226" font-size="13" fill="#8b949e">Capability &amp; outcome · 5–7 slides</text>
  </g>
  <g>
    <rect x="740" y="254" width="456" height="92" rx="13" fill="url(#blueFill)" stroke="#6e8bff" stroke-width="1.5"/>
    <text x="764" y="286" font-size="16" font-weight="800" fill="#9db0ff">“Is the design right &amp; buildable?”</text>
    <text x="764" y="310" font-size="13.5" fill="#c9d1d9">Currency: <tspan font-weight="700" fill="#e6edf3">NFRs · trade-offs · sequencing</tspan></text>
    <text x="764" y="330" font-size="13" fill="#8b949e">Pattern &amp; reference architecture · 8–12 slides</text>
  </g>
  <g>
    <rect x="740" y="358" width="456" height="92" rx="13" fill="url(#greenFill)" stroke="#3fb950" stroke-width="1.5"/>
    <text x="764" y="390" font-size="16" font-weight="800" fill="#56d364">“How do I build to standard?”</text>
    <text x="764" y="414" font-size="13.5" fill="#c9d1d9">Currency: <tspan font-weight="700" fill="#e6edf3">interfaces · constraints · guardrails</tspan></text>
    <text x="764" y="434" font-size="13" fill="#8b949e">Reference implementation · as long as correctness needs</text>
  </g>

  <!-- footer -->
  <rect x="44" y="470" width="1152" height="46" rx="11" fill="#161b22" stroke="#30363d"/>
  <text x="620" y="499" font-size="14" font-weight="600" fill="#c9d1d9" text-anchor="middle">“Take it to the board” = start from the architect deck, strip the components, add the money — don't regenerate from scratch.</text>
</svg>
