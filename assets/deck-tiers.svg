<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 470" width="1200" height="470" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="d-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10151f"/>
      <stop offset="1" stop-color="#0b0f17"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="1198" height="468" rx="20" fill="url(#d-bg)" stroke="#30363d" stroke-width="1.5"/>
  <text x="40" y="56" font-size="26" font-weight="800" fill="#e6edf3">One architecture, three altitudes</text>
  <text x="40" y="86" font-size="16" fill="#8b949e">The substance is constant; the altitude, vocabulary and the question being answered change. Re-altitude by subtraction, not rewriting.</text>

  <!-- pyramid tiers -->
  <!-- C-level -->
  <polygon points="600,118 740,196 460,196" fill="#1a1206" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600" y="170" font-size="15" font-weight="800" fill="#fbbf24" text-anchor="middle">C-LEVEL / BOARD</text>

  <!-- architect -->
  <polygon points="455,202 745,202 825,290 375,290" fill="#0e1726" stroke="#6e8bff" stroke-width="1.5"/>
  <text x="600" y="252" font-size="15" font-weight="800" fill="#6e8bff" text-anchor="middle">SOLUTION ARCHITECTS</text>

  <!-- engineering -->
  <polygon points="370,296 830,296 910,392 290,392" fill="#0c1a12" stroke="#3fb950" stroke-width="1.5"/>
  <text x="600" y="350" font-size="15" font-weight="800" fill="#3fb950" text-anchor="middle">ENGINEERING / DELIVERY</text>

  <!-- right cards -->
  <g>
    <rect x="880" y="118" width="280" height="80" rx="12" fill="#1a1206" stroke="#fbbf24"/>
    <text x="900" y="144" font-size="14" font-weight="800" fill="#fbbf24">"Do we fund / approve this?"</text>
    <text x="900" y="166" font-size="12.5" fill="#8b949e">Currency: money, risk, time</text>
    <text x="900" y="186" font-size="12.5" fill="#8b949e">Capability &amp; outcome · 5–7 slides</text>
  </g>
  <g>
    <rect x="880" y="210" width="280" height="80" rx="12" fill="#0e1726" stroke="#6e8bff"/>
    <text x="900" y="236" font-size="14" font-weight="800" fill="#6e8bff">"Is the design right &amp; buildable?"</text>
    <text x="900" y="258" font-size="12.5" fill="#8b949e">Currency: NFRs, trade-offs, sequencing</text>
    <text x="900" y="278" font-size="12.5" fill="#8b949e">Pattern &amp; reference arch · 8–12 slides</text>
  </g>
  <g>
    <rect x="880" y="302" width="280" height="80" rx="12" fill="#0c1a12" stroke="#3fb950"/>
    <text x="900" y="328" font-size="14" font-weight="800" fill="#3fb950">"How do I build to standard?"</text>
    <text x="900" y="350" font-size="12.5" fill="#8b949e">Currency: interfaces, constraints, guardrails</text>
    <text x="900" y="370" font-size="12.5" fill="#8b949e">Reference implementation · as long as needed</text>
  </g>

  <!-- left labels: altitude -->
  <text x="250" y="160" font-size="12" fill="#6e7681" font-weight="700" text-anchor="middle">less detail</text>
  <text x="250" y="180" font-size="12" fill="#6e7681" font-weight="700" text-anchor="middle">more money</text>
  <text x="250" y="350" font-size="12" fill="#6e7681" font-weight="700" text-anchor="middle">more detail</text>
  <text x="250" y="370" font-size="12" fill="#6e7681" font-weight="700" text-anchor="middle">more concrete</text>

  <!-- footer -->
  <rect x="40" y="412" width="1120" height="44" rx="10" fill="#161b22" stroke="#30363d"/>
  <text x="600" y="440" font-size="14" font-weight="600" fill="#c9d1d9" text-anchor="middle">"Take it to the board" = start from the architect deck, strip the components, add the money — don't regenerate from scratch.</text>
</svg>
